
{% extends "base.html" %}

    {% block content %}
    {% load crispy_forms_tags %}

    <h2 class="text-center"> Login Here</h2>
    <form action="{% url 'login' %}" method="post" style="width: 500px; margin: auto;">
        {% csrf_token %}
        {{ form | crispy }}
        &nbsp;
        &nbsp;
        <div>
            <button type="submit" class="btn btn-warning">Login</button>
        </div>
    </form>
    
    {% endblock %}
