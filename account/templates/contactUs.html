{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <!-- Sidebar Navigation -->
        <!-- load the sidebar-->
        {% include 'sidebar.html' %}
        <!-- Main Content -->
        <div class="col-md-9 col-lg-10">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 mb-0">All Contact Form</h1>
            </div>

            <!-- Dynamic Patients Table -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light">
                    <h5 class="mb-0 text-dark">Contact</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Sr No.</th>
                                <th>Name</th>
                                <th>Phone No.</th>
                                <th>Email Id</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for c in contacts %}
                            <tr>
                                <td>{{ forloop.counter }}</td>
                                <td>{{ c.full_name }}</td>
                                <td>{{ c.phone }}</td>
                                <td>{{ c.email }}</td>
                                <td>{{ c.message }}</td>
                            </tr>
                            {% empty %}
                            <tr>
                                <td colspan="9" class="text-center py-4 text-muted">No Message </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </div>
</div>




{% endblock %}
