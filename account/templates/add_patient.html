{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
            {% include 'sidebar.html' %}
        
        <div class="col-md-8 col-lg-9">
            <div class="row justify-content-center mt-3">
                <div class="col-12 col-xl-8">
                    <div class="card shadow border-0">
                        <div class="card-header bg-dark text-white py-3">
                            <h4 class="mb-0 h5">Register New Patient</h4>
                        </div>
                        <div class="card-body p-4">
                            <form method="POST">
                                {% csrf_token %}
                                
                                <!-- Django Form Fields -->
                                {{ form.as_p }}
                                
                                <div class="d-flex justify-content-between mt-4">
                                    <a href="{% url 'dashboard' %}" class="btn btn-secondary shadow-sm">Cancel</a>
                                    <button type="submit" class="btn btn-warning text-dark font-weight-bold shadow-sm">Save Patient</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
